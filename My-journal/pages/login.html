<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Journal - Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/login.css" />
  </head>

  <body>
    <header>
      <div class="name">
        <a href="/index.html" class="story">
          <img src="../assets/book (1).png" class="book" />
          <div class="logo">My Journal</div>
        </a>
      </div>

      <div class="features">
        <a href="./save-journal.html" class="story">My Journey</a>
        <a href="./journal.html" class="story">Story</a>
        <a href="./to-do-list.html" class="todo">Todo</a>
        <a href="./wish-list.html" class="wishe">Wishes</a>
        <a href="./profile.html" class="profile">Profile </a>
      </div>
    </header>
    <main class="login-wrapper">
      <div class="login-box">
        <div class="tabs">
          <h1>Login</h1>
        </div>

        <form onsubmit="login(event)">
          <label>Email</label>
          <div class="input-field">
            <span class="input-icon"></span>
            <input type="email" id="loginEmail" placeholder="Enter your email" required />
          </div>

          <label>Password</label>
          <div class="input-field">
            <span class="input-icon"></span>
            <input type="password" id="loginPassword" placeholder="Enter your password" required />
          </div>

          <button type="submit" class="login-btn">Sign In</button>
          <p id="loginMessage"></p>

          <div class="extra-links"><a href="#">Forgot password?</a><br /></div>
          <div class="extra-links-A">
            <a href="../pages/register.html">Register for a new account</a>
          </div>

          <p class="secure">Secure & Private</p>
        </form>
      </div>
    </main>
<script>
async function login(event){

    event.preventDefault()

    const email = document.getElementById("loginEmail").value
    const password = document.getElementById("loginPassword").value

    const response = await fetch("http://localhost:8000/users/login",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            emailID:email,
            password:password
        })
    })

    const data = await response.json()

    if(data.user_id){
        localStorage.setItem("user_id",data.user_id)
        localStorage.setItem("full_name", data.full_name)

        alert("✅ Login Successful")

        // redirect after login
        window.location.href="../pages/save-journal.html"
    }
    else{
        alert("❌ Invalid Email or Password")
    }
}
</script>
  </body>
</html>
